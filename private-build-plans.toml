[buildPlans.iosevka-custom-term]
family = "Iosevka Custom Term"
spacing = "term"
serifs = "slab"
no-cv-ss = true
no-ligation = true

[buildPlans.iosevka-custom-term.variants]
inherits = "ss15"

[buildPlans.iosevka-custom-term.variants.design]
number-sign = "slanted"
percent = "rings-continuous-slash"

[buildPlans.iosevka-custom-term.weights.regular]
shape = 400
menu = 400
css = 400

[buildPlans.iosevka-custom-term.weights.bold]
shape = 700
menu = 700
css = 700

[buildPlans.iosevka-custom-term.widths.normal]
shape = 600
menu = 5
css = "normal"

[buildPlans.iosevka-custom-term.slopes.upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.iosevka-custom-term.slopes.italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"
