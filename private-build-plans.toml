###################################################################################################
# Iosevka Custom

[buildPlans.iosevka-custom]
family = "Iosevka Custom"
spacing = "fixed"
serifs = "slab"
no-cv-ss = true
no-ligation = true

[buildPlans.iosevka-custom.variants]
inherits = "ss15"

[buildPlans.iosevka-custom.variants.design]
capital-c = "bilateral-serifed"
capital-j = "serifed-both-sides"
capital-s = "bilateral-inward-serifed"
a = "double-storey-serifed"
c = "bilateral-serifed"
f = "serifed"
j = "serifed"
s = "bilateral-inward-serifed"
t = "standard"
r = "corner-hooked-serifed"
cyrl-capital-ze = "bilateral-serifed"
cyrl-ze = "bilateral-serifed"
zero = "slashed"
one = "base-long-top-serif"
six = "closed-contour"
nine = "closed-contour"
asterisk = "penta-high"
caret = "high"
number-sign = "slanted"
ampersand = "closed"
at = "fourfold"
percent = "rings-continuous-slash"
question = "smooth"
punctuation-dot = "square"

[buildPlans.iosevka-custom.weights.regular]
shape = 400
menu = 400
css = 400

[buildPlans.iosevka-custom.weights.bold]
shape = 700
menu = 700
css = 700

[buildPlans.iosevka-custom.widths.normal]
shape = 600
menu = 5
css = "normal"

[buildPlans.iosevka-custom.slopes.upright]
angle = 0
shape = "upright"
menu = "upright"
css = "normal"

[buildPlans.iosevka-custom.slopes.italic]
angle = 9.4
shape = "italic"
menu = "italic"
css = "italic"

#
###################################################################################################

